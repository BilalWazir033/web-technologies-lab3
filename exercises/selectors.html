<!DOCTYPE html>
<html>
<head>
<title>CSS Selectors Practice</title>
<style>
/* 1 Basic Selectors */
h2{
color:#2563eb;
}
p{
color:#333;
}
#special{
color:red;
}
.box{
background:#dbeafe;
padding:10px;
margin:10px;
}

*{
font-family:Arial;
}

/* 2 Attribute Selectors */

input[type="text"]{
border:2px solid blue;
}

input[type="email"]{
border:2px solid green;
}

a[target="_blank"]{
color:purple;
}

/* 3 Combinators */

div p{
color:#444;
}

ul > li{
color:#1e40af;
}

h2 + p{
font-style:italic;
}

h2 ~ span{
color:orange;
}

/* 4 Pseudo Classes */

a:hover{
color:red;
}

input:focus{
background:#eef2ff;
}

li:first-child{
font-weight:bold;
}

li:last-child{
color:green;
}

li:nth-child(3){
color:purple;
}

/* 5 Pseudo Elements */

p::first-letter{
font-size:30px;
color:#2563eb;
}

p::first-line{
font-weight:bold;
}

</style>

</head>

<body>

<h2>CSS Selectors Demonstration</h2>

<p>This paragraph demonstrates pseudo-elements.</p>

<p id="special">This paragraph uses an ID selector.</p>

<div class="box">
<p>This paragraph is inside a div.</p>
</div>

<h3>List Example</h3>

<ul>
<li>Item One</li>
<li>Item Two</li>
<li>Item Three</li>
<li>Item Four</li>
</ul>

<h3>Form Example</h3>

<input type="text" placeholder="Your Name"><br><br>
<input type="email" placeholder="Email"><br><br>

<a href="https://google.com" target="_blank">External Link</a>

<br><br>

<a href="../index.html">Back to Home</a>

</body>
</html>
