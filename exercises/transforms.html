<!DOCTYPE html>
<html>
<head>

<title>CSS Transform Gallery</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:30px;
}

h2{
margin-bottom:30px;
}

/* gallery layout */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}

/* transform boxes */

.box{
background:#2563eb;
color:white;
padding:40px;
border-radius:10px;
transition:0.5s;
cursor:pointer;
}

/* rotation */

.rotate:hover{
transform:rotate(45deg);
}

/* scale */

.scale:hover{
transform:scale(1.3);
}

/* translate */

.translate:hover{
transform:translate(30px,20px);
}

/* 3D rotate */

.rotate3d:hover{
transform:rotateY(180deg);
}

/* transform origin */

.origin{
transform-origin:top left;
}

.origin:hover{
transform:rotate(30deg);
}

/* combined transforms */

.combo:hover{
transform:rotate(15deg) scale(1.2) translateY(-10px);
}

/* perspective for 3D */

.container{
perspective:800px;
}

</style>

</head>

<body>

<h2>CSS Transform Gallery</h2>

<div class="container">

<div class="box rotate">
Rotation
</div>

<div class="box scale">
Scaling
</div>

<div class="box translate">
Translation
</div>

<div class="box rotate3d">
3D Rotation
</div>

<div class="box origin">
Transform Origin
</div>

<div class="box combo">
Combined Transform
</div>

</div>

<p style="margin-top:40px;">
<a href="../index.html">← Back to Home</a>
</p>

</body>
</html>
